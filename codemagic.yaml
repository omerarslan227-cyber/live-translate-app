workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.omerarslan.livetranslate

    integrations:
      app_store_connect: codemagic

    scripts:
      - name: Get packages
        script: |
          cd /Users/builder/clone
          flutter clean
          flutter pub get

      - name: Set signing
        script: |
          cd /Users/builder/clone
          xcode-project use-profiles

      - name: Build archive
        script: |
          cd /Users/builder/clone
          flutter build ios --release --no-codesign

      - name: Create export options
        script: |
          cat > /Users/builder/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>CDY9NL37S7</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.omerarslan.livetranslate</key>
              <string>ASD</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        script: |
          cd /Users/builder/clone
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /Users/builder/exportOptions.plist

      - name: Show output
        script: |
          cd /Users/builder/clone
          ls -R build/ios || true

    artifacts:
      - /Users/builder/clone/build/ios/ipa/*.ipa
      - /Users/builder/clone/build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true