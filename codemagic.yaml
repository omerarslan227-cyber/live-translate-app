workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Set up code signing on Xcode project
        script: |
          xcode-project use-profiles

      - name: Build iOS (IPA)
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa